<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagewise AI Summarizer</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="icon" type="image/png" href="../icons/icon16.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="app-shell">
      <!-- HEADER -->
      <div class="header">
        <div class="header-left">
          <div class="logo">
            <img src="../icons/icon48.png" alt="Pagewise logo" />
          </div>

          <div class="title-group">
            <h1>Pagewise AI Summarizer</h1>
            <p>Smart webpage insights in seconds</p>
          </div>
        </div>

        <button id="theme-toggle-btn" class="theme-toggle-btn">
          <img
            id="theme-icon"
            src="../icons/moon-solid.png"
            alt="Theme Toggle"
            class="theme-icon"
          />
        </button>
      </div>

      <!-- MAIN -->
      <main class="main-content">
        <button id="summarize-btn" class="primary-btn">Summarize Page</button>

        <!-- LOADING -->
        <div id="loading" class="loading hidden">
          <div class="spinner"></div>
          <p>AI is reading the page...</p>
        </div>

        <!-- TABS -->
        <div class="tabs">
          <button class="tab active" data-tab="summary">Summary</button>
          <button class="tab" data-tab="points">Key Points</button>
          <button class="tab" data-tab="settings">Settings</button>
        </div>

        <!-- OUTPUT -->
        <section id="output" class="summary-card">
          <div class="placeholder">
            <p>Click “Summarize Page” to generate structured insights.</p>
          </div>
        </section>
      </main>

      <!-- FOOTER -->
      <footer class="actions">
        <button id="copy-btn" class="secondary-btn">Copy</button>
        <button id="clear-btn" class="secondary-btn">Clear</button>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
